version: 2
updates:
  # Keep SHA-pinned actions current — including the cross-repo ci-workflows
  # composite actions referenced from .github/workflows/ci.yml. Review every PR
  # before merge; never auto-merge (a SHA bump is executable CI logic). Bumping
  # the pin to the private ci-workflows repo requires the org-level "Grant
  # Dependabot access to private repositories" setting to include ci-workflows.
  # Delay version bumps so a compromised or yanked release is caught before we
  # adopt it; security updates bypass cooldown. Defense-in-depth for the
  # SHA-rewrite supply-chain risk that motivates SHA-pinning.
  - package-ecosystem: github-actions
    directory: /
    labels: ["dependencies"]
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      # First-party melodic-software/* actions skip the supply-chain wait so our
      # own ci-workflows fixes propagate without the cooldown delay.
      exclude:
        - "melodic-software/*"
    # Collapse all action bumps into one PR to cut review noise.
    groups:
      github-actions:
        patterns:
          - "*"
    # The runner-policy allowlist pins ci-workflows reusable-workflow refs to
    # independently reviewed SHAs, so a Dependabot bump to an unreviewed main
    # commit can only fail the Runner policy lane. Those pins move through
    # deliberate reviewed PRs after a standards allowlist update; composite
    # actions (melodic-software/ci-workflows/.github/actions/*) are not
    # SHA-allowlisted and stay Dependabot-managed.
    ignore:
      - dependency-name: "melodic-software/ci-workflows/*"
  # Keep the npm dev-dependencies current — the markdownlint-cli2 and YAML
  # parser pins, plus the lefthook pin that the local git hooks run on.
  - package-ecosystem: npm
    directory: /
    labels: ["dependencies"]
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    # Batch minor and patch bumps into one PR; majors stay individual so
    # breaking changes get their own review.
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
  # The runner policy is distributed with its own runtime lockfile, so it is a
  # separate npm dependency root. Keep this entry in sync with that component;
  # every downstream materialization must add the equivalent destination path.
  - package-ecosystem: npm
    directory: /components/runner-policy
    labels: ["dependencies"]
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
  # The concurrency policy analyzer is distributed with its own runtime
  # lockfile, so it is a separate npm dependency root. Keep this entry in sync
  # with that component; every downstream materialization must add the
  # equivalent destination path.
  - package-ecosystem: npm
    directory: /components/concurrency-policy
    labels: ["dependencies"]
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
  # Distribution validation is an independent runtime dependency root.
  - package-ecosystem: npm
    directory: /distribution
    labels: ["dependencies"]
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
