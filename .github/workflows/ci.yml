name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# The PR number keys pull_request runs, so a new push supersedes that PR's
# in-flight run without colliding with same-named branches from other head
# repos; main pushes fall back to the unique run_id and are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Public repository: every lane runs on GitHub-hosted ubuntu-24.04 (free for
# public repositories); the local-runner selector is not permitted here. The
# ci-status gateway aggregates the same lane IDs, so required check names do
# not change. Workload steps are route-independent: pinned setup/composite
# actions install every tool, and setup-action caches are GitHub-managed.
jobs:
  markdown:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: melodic-software/ci-workflows/.github/actions/markdown@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: .markdownlint-cli2.jsonc
          globs: '**/*.md !components/**/fixtures/bad/**'

  powershell:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: melodic-software/ci-workflows/.github/actions/powershell@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          settings: PSScriptAnalyzerSettings.psd1
          exclude: components/psscriptanalyzer/fixtures/bad

  shellcheck:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint shell
        uses: melodic-software/ci-workflows/.github/actions/shellcheck@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          rcfile: .shellcheckrc
          exclude: components/shellcheck/fixtures/bad

  lychee:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links (offline)
        uses: melodic-software/ci-workflows/.github/actions/lychee-offline@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: lychee.toml
          exclude: 'components/[^/]+/fixtures/bad'

  editorconfig:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Self-lint repository (installs ec, excludes intentionally-bad fixtures)
        uses: melodic-software/ci-workflows/.github/actions/editorconfig@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: .editorconfig-checker.json
          exclude: 'components/[^/]+/fixtures/bad/'
      - name: EditorConfig checker contract test
        run: bash harness/shell/run-tests.sh components/editorconfig-checker/editorconfig-checker.test.sh

  gitleaks:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan repository for secrets (installs gitleaks)
        uses: melodic-software/ci-workflows/.github/actions/gitleaks@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: .gitleaks.toml
      - name: Gitleaks contract test
        run: bash harness/shell/run-tests.sh components/gitleaks/gitleaks.test.sh

  typos:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spell-check repository (installs typos, excludes intentionally-bad fixtures)
        uses: melodic-software/ci-workflows/.github/actions/typos@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: _typos.toml
          exclude: 'components/*/fixtures/bad/'
      - name: Typos contract test
        run: bash harness/shell/run-tests.sh components/typos/typos.test.sh

  markdown-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Markdownlint contract test
        run: bash harness/shell/run-tests.sh components/markdownlint/markdownlint.test.sh

  runner-policy:
    name: Runner policy
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            components/runner-policy/package-lock.json
      - name: Install pinned dependencies
        run: npm ci
      - name: Install runner-policy dependencies
        run: npm ci --prefix components/runner-policy
      - name: Test package lifecycle
        run: npm run test:packages
      - name: Enforce package lifecycle
        env:
          PACKAGE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: node harness/packages/package-lifecycle.mjs
      - name: Test runner policy
        run: npm run test:runner-policy
      - name: Test .NET staged adapter
        run: npm run test:lefthook-dotnet
      - name: Enforce runner policy on standards
        run: npm run lint:runner-policy
        env:
          CI_REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}

  concurrency-policy:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: components/concurrency-policy/package-lock.json
      - name: Install concurrency-policy dependencies
        run: npm ci --prefix components/concurrency-policy
      - name: Test concurrency policy
        run: npm run test:concurrency-policy
      - name: Enforce concurrency policy on standards
        run: npm run lint:concurrency-policy

  dependabot-policy:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: components/dependabot-policy/package-lock.json
      - name: Install dependabot-policy dependencies
        run: npm ci --prefix components/dependabot-policy
      - name: Test dependabot policy
        run: npm run test:dependabot-policy
      - name: Enforce dependabot policy on standards
        run: npm run lint:dependabot-policy

  powershell-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Ensure PSScriptAnalyzer 1.25.0
        shell: pwsh
        run: |
          $required = '1.25.0'
          $have = Get-Module -ListAvailable PSScriptAnalyzer |
              Where-Object { $_.Version -eq [version]$required }
          if (-not $have) {
              try {
                  Install-Module PSScriptAnalyzer -RequiredVersion $required -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
              } catch {
                  Install-PSResource PSScriptAnalyzer -Version $required -Scope CurrentUser -TrustRepository -Reinstall -ErrorAction Stop
              }
          }
          Import-Module PSScriptAnalyzer -RequiredVersion $required -ErrorAction Stop
          Write-Output "PSScriptAnalyzer $((Get-Module PSScriptAnalyzer).Version) on pwsh $($PSVersionTable.PSVersion)"
      - name: PSScriptAnalyzer contract test
        run: bash harness/shell/run-tests.sh components/psscriptanalyzer/psscriptanalyzer.test.sh
      - name: PSScriptAnalyzer staged-adapter regression
        shell: pwsh
        run: ./components/lefthook-powershell/psscriptanalyzer-staged.test.ps1

  shellcheck-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ShellCheck 0.11.0
        run: |
          set -euo pipefail
          ver=0.11.0
          sha=b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6
          url="https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.gz"
          curl -fsSL "$url" -o shellcheck.tar.gz
          echo "${sha}  shellcheck.tar.gz" | sha256sum -c -
          tar -xzf shellcheck.tar.gz "shellcheck-v${ver}/shellcheck"
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          rm -rf shellcheck.tar.gz "shellcheck-v${ver}"
          shellcheck --version
      - name: ShellCheck contract test
        run: bash harness/shell/run-tests.sh components/shellcheck/shellcheck.test.sh

  lychee-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install lychee 0.24.2
        run: |
          set -euo pipefail
          ver=0.24.2
          sha=1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          asset=lychee-x86_64-unknown-linux-gnu
          url="https://github.com/lycheeverse/lychee/releases/download/lychee-v${ver}/${asset}.tar.gz"
          curl -fsSL "$url" -o lychee.tar.gz
          echo "${sha}  lychee.tar.gz" | sha256sum -c -
          tar -xzf lychee.tar.gz --strip-components=1 "${asset}/lychee"
          sudo install lychee /usr/local/bin/lychee
          rm -f lychee.tar.gz lychee
          lychee --version
      - name: Lychee contract test
        run: bash harness/shell/run-tests.sh components/lychee/lychee.test.sh

  ruff:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check Python
        uses: melodic-software/ci-workflows/.github/actions/ruff@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: ruff.toml
          exclude: components/ruff/fixtures/bad

  pyright:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check Python
        # The shipped ruleset carries no project-scope `include`, so scope Pyright
        # at the conforming fixture explicitly (the bad fixture is non-conforming
        # by design).
        uses: melodic-software/ci-workflows/.github/actions/pyright@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: components/pyright/pyrightconfig.json
          paths: components/pyright/fixtures/good

  biome:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check JS/TS
        # Scope at authored runtime surfaces and the conforming fixture. Bad
        # fixtures are non-conforming by design; node_modules and locks are
        # excluded by Biome's normal traversal rules.
        uses: melodic-software/ci-workflows/.github/actions/biome@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          config: components/biome/biome.json
          paths: components/biome/fixtures/good components/concurrency-policy components/dependabot-policy components/runner-policy distribution harness/packages

  tsc:
    name: TypeScript ${{ matrix.typescript }}
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        typescript: [5.9.3, 6.0.3, 7.0.2]
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Install exact TypeScript release
        env:
          TYPESCRIPT_VERSION: ${{ matrix.typescript }}
        run: npm install --global "typescript@$TYPESCRIPT_VERSION"
      - name: Verify exact TypeScript release
        env:
          TYPESCRIPT_VERSION: ${{ matrix.typescript }}
        run: test "$(tsc --version)" = "Version $TYPESCRIPT_VERSION"
      - name: Test packed tsconfig contract
        run: bash harness/shell/run-tests.sh components/tsconfig/tsconfig.test.sh

  dotnet-build:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # The rootless fleet has no write access to setup-dotnet's Linux default.
      # Keep hosted/local parity by selecting a per-job ephemeral directory.
      DOTNET_INSTALL_DIR: ~/.dotnet
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build .NET (analyzers + code-style as errors)
        # The shipped base carries no project scope, so scope the build at the
        # conforming fixture, which imports the base props (the bad fixture is
        # non-conforming by design).
        uses: melodic-software/ci-workflows/.github/actions/dotnet-build@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          project: components/dotnet-analysis/fixtures/good/good.csproj

  dotnet-format:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      DOTNET_INSTALL_DIR: ~/.dotnet
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify .NET whitespace
        uses: melodic-software/ci-workflows/.github/actions/dotnet-format@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          project: components/dotnet-analysis/fixtures/good/good.csproj

  actionlint:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: melodic-software/ci-workflows/.github/actions/actionlint@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14

  zizmor:
    permissions:
      contents: read
    # Actions security lint. High-severity findings block the lane; lower
    # severities annotate. Gating runs in-lane via the SARIF guard, so it
    # rides the existing ci-status gate — no code-scanning, no elevated grant.
    uses: melodic-software/ci-workflows/.github/workflows/zizmor.yml@31a5b76c4a0b663023dc1c944e2bcfc01d6f6c46 # 31a5b76 2026-07-21
    with:
      runner: ubuntu-24.04
      paths: .
      fail-on-severity: high

  osv-scanner:
    permissions:
      contents: read
    # Advisory dependency vuln scan; reports against package-lock.json without
    # blocking (fail-on-vuln defaults false). Annotation mode needs no
    # security-events write grant.
    uses: melodic-software/ci-workflows/.github/workflows/osv-scanner.yml@90f1c54935203fa31b5b3d1f41531228be2c2b7f # 90f1c54 2026-07-18
    with:
      runner: ubuntu-24.04

  go-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GO_VERSION: 1.26.5
      GOLANGCI_LINT_VERSION: 2.12.2
      GOLANGCI_LINT_SHA256: 8df580d2670fed8fa984aac0507099af8df275e665215f5c7a2ae3943893a553
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install golangci-lint from the official release
        run: |
          set -euo pipefail
          archive="golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz"
          url="https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_LINT_VERSION}/${archive}"
          curl -q --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            --connect-timeout 10 --max-time 120 \
            --retry 2 --retry-max-time 300 \
            --output "$archive" -- "$url"
          echo "${GOLANGCI_LINT_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive"
          install_dir="$RUNNER_TEMP/standards-bin"
          mkdir -p "$install_dir"
          install -m 0755 \
            "golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64/golangci-lint" \
            "$install_dir/golangci-lint"
          echo "$install_dir" >> "$GITHUB_PATH"
          rm -rf "$archive" "golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64"
      - name: Verify exact toolchain
        run: |
          test "$(go env GOVERSION)" = "go${GO_VERSION}"
          golangci-lint version | grep -F "version ${GOLANGCI_LINT_VERSION}"
      - name: Go analysis contract test
        run: bash harness/shell/run-tests.sh components/go-analysis/go-analysis.test.sh

  python-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # Inline install — component contract tests assert specific rule codes on
      # bad fixtures, which needs the tools on PATH (the Ruff/Pyright actions
      # only pass/fail). Keep in lockstep with the action defaults in ci-workflows
      # and with medley.
      RUFF_VERSION: 0.15.14
      PYRIGHT_VERSION: 1.1.409
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
      - name: Install ruff and pyright
        run: |
          uv tool install "ruff==${RUFF_VERSION}"
          uv tool install "pyright==${PYRIGHT_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify toolchain
        # Also warms pyright's first-run Node download so the test step is fast.
        run: |
          ruff --version
          pyright --version
      - name: Ruff contract test
        run: bash harness/shell/run-tests.sh components/ruff/ruff.test.sh
      - name: Pyright contract test
        run: bash harness/shell/run-tests.sh components/pyright/pyright.test.sh

  typescript-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # Inline install — component tests assert specific rule/error codes on
      # the bad fixture, which needs the tools on PATH (the biome/tsc actions
      # only pass/fail). Keep in lockstep with the action defaults in ci-workflows
      # and with medley.
      BIOME_VERSION: 2.5.1
      TYPESCRIPT_VERSION: 6.0.3
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Install biome and tsc
        run: npm install -g "@biomejs/biome@${BIOME_VERSION}" "typescript@${TYPESCRIPT_VERSION}"
      - name: Verify toolchain
        run: |
          biome --version
          tsc --version
      - name: Biome contract test
        run: bash harness/shell/run-tests.sh components/biome/biome.test.sh
      - name: TypeScript config contract test
        run: bash harness/shell/run-tests.sh components/tsconfig/tsconfig.test.sh

  dotnet-fixtures:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # Inline install — the fixtures suite asserts specific rule codes fire on
      # the bad fixture, which needs the SDK on PATH (the dotnet-build/dotnet-format
      # actions only pass/fail). Keep in lockstep with the action defaults in
      # ci-workflows and with medley.
      DOTNET_INSTALL_DIR: ~/.dotnet
      DOTNET_VERSION: 10.0.301
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Verify toolchain
        run: |
          dotnet --version
          node --version
      - name: .NET analysis contract test
        run: bash harness/shell/run-tests.sh components/dotnet-analysis/dotnet-analysis.test.sh
      - name: .NET staged-adapter integration
        run: >-
          node components/lefthook-dotnet/dotnet-format-staged.mjs
          components/dotnet-analysis/fixtures/good/Calculator.cs
        env:
          DOTNET_FORMAT_WORKSPACE: components/dotnet-analysis/fixtures/good/good.csproj

  harness:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Harness self-test
        run: bash harness/shell/run-tests.sh harness/shell/lib.test.sh

  distribution:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: distribution/package-lock.json
      - name: Install distribution dependencies
        run: npm ci --prefix distribution
      - name: Install yq 4.53.3
        run: |
          set -euo pipefail
          version=4.53.3
          sha=fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4
          url="https://github.com/mikefarah/yq/releases/download/v${version}/yq_linux_amd64"
          curl -fsSL "$url" -o yq
          echo "${sha}  yq" | sha256sum -c -
          sudo install yq /usr/local/bin/yq
          rm yq
          yq --version
      - name: Test distribution engine
        run: bash distribution/sync-manifest.test.sh
      - name: Validate production manifest
        run: bash distribution/sync-manifest.sh validate

  exec-bit:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify shebang files are executable
        uses: melodic-software/ci-workflows/.github/actions/exec-bit@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14

  machine-specific-paths:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for machine-specific paths (excludes the pattern source, which self-matches)
        uses: melodic-software/ci-workflows/.github/actions/machine-specific-paths@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          exclude: ':(exclude)components/path-detection/**'
      - name: Path-detection contract test
        run: bash harness/shell/run-tests.sh components/path-detection/machine-path-patterns.test.sh

  eol-renormalize:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check index-level EOL drift
        uses: melodic-software/ci-workflows/.github/actions/eol-renormalize@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14

  comment-hygiene:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan comment hygiene (excludes contract fixtures and policy source)
        uses: melodic-software/ci-workflows/.github/actions/comment-hygiene@f2d5e06757201f2fce187096a2c6fa805836c3d2 # f2d5e06 2026-07-14
        with:
          exclude: ':(exclude)components/*/fixtures/bad/** :(exclude)components/comment-hygiene/**'
      - name: Comment-hygiene contract test
        run: bash harness/shell/run-tests.sh components/comment-hygiene/comment-hygiene.test.sh

  lefthook:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Put npm bin on PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Install ShellCheck 0.11.0
        # The component test drives the ShellCheck lane as its representative tool,
        # so the engine must be on PATH (kept in lockstep with shellcheck-fixtures).
        run: |
          set -euo pipefail
          ver=0.11.0
          sha=b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6
          url="https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.gz"
          curl -fsSL "$url" -o shellcheck.tar.gz
          echo "${sha}  shellcheck.tar.gz" | sha256sum -c -
          tar -xzf shellcheck.tar.gz "shellcheck-v${ver}/shellcheck"
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          rm -rf shellcheck.tar.gz "shellcheck-v${ver}"
          shellcheck --version
      - name: Validate the merged hook config (root + all fragments)
        run: lefthook validate
      - name: Lefthook ShellCheck contract test
        run: bash harness/shell/run-tests.sh components/lefthook-shellcheck/lefthook-shellcheck.test.sh

  ci-status:
    if: ${{ !cancelled() }}
    permissions: {}
    needs:
      - markdown
      - powershell
      - shellcheck
      - lychee
      - editorconfig
      - gitleaks
      - typos
      - markdown-fixtures
      - runner-policy
      - concurrency-policy
      - dependabot-policy
      - powershell-fixtures
      - shellcheck-fixtures
      - lychee-fixtures
      - ruff
      - pyright
      - python-fixtures
      - go-fixtures
      - biome
      - tsc
      - typescript-fixtures
      - dotnet-build
      - dotnet-format
      - dotnet-fixtures
      - harness
      - distribution
      - lefthook
      - exec-bit
      - machine-specific-paths
      - eol-renormalize
      - comment-hygiene
      - actionlint
      - zizmor
      - osv-scanner
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        uses: melodic-software/ci-workflows/.github/actions/ci-status@87fb95c3b05fa318b9dd8c2c164cc550071a1ccb # v0.7.0
        with:
          treat-skipped-as: fail
          results: >-
            ${{ needs.markdown.result }}
            ${{ needs.powershell.result }}
            ${{ needs.shellcheck.result }}
            ${{ needs.lychee.result }}
            ${{ needs.editorconfig.result }}
            ${{ needs.gitleaks.result }}
            ${{ needs.typos.result }}
            ${{ needs.markdown-fixtures.result }}
            ${{ needs.runner-policy.result }}
            ${{ needs.concurrency-policy.result }}
            ${{ needs.dependabot-policy.result }}
            ${{ needs.powershell-fixtures.result }}
            ${{ needs.shellcheck-fixtures.result }}
            ${{ needs.lychee-fixtures.result }}
            ${{ needs.ruff.result }}
            ${{ needs.pyright.result }}
            ${{ needs.python-fixtures.result }}
            ${{ needs.go-fixtures.result }}
            ${{ needs.biome.result }}
            ${{ needs.tsc.result }}
            ${{ needs.typescript-fixtures.result }}
            ${{ needs.dotnet-build.result }}
            ${{ needs.dotnet-format.result }}
            ${{ needs.dotnet-fixtures.result }}
            ${{ needs.harness.result }}
            ${{ needs.distribution.result }}
            ${{ needs.lefthook.result }}
            ${{ needs.exec-bit.result }}
            ${{ needs.machine-specific-paths.result }}
            ${{ needs.eol-renormalize.result }}
            ${{ needs.comment-hygiene.result }}
            ${{ needs.actionlint.result }}
            ${{ needs.zizmor.result }}
            ${{ needs.osv-scanner.result }}
