name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

# Self-lint lanes run the ci-workflows composite actions (referenced by SHA,
# bumped via Dependabot). The fixture-assertion lanes stay local — they prove
# this repo's own configs flag the bad fixtures — and the ci-status gateway
# aggregates everything into the single required check.
jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint markdown
        uses: melodic-software/ci-workflows/.github/actions/markdown@00245790fdb56f45b83fd4a38f8f74ff66c90328 # 0024579 2026-06-22
        with:
          globs: '**/*.md !fixtures/markdown/bad/**'

  powershell:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Analyze PowerShell
        uses: melodic-software/ci-workflows/.github/actions/powershell@00245790fdb56f45b83fd4a38f8f74ff66c90328 # 0024579 2026-06-22
        with:
          exclude: fixtures/powershell/bad

  markdown-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Markdown module fixtures test
        run: bash harness/shell/run-tests.sh modules/markdown/markdown.test.sh

  powershell-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Ensure PSScriptAnalyzer 1.25.0
        shell: pwsh
        run: |
          $required = '1.25.0'
          $have = Get-Module -ListAvailable PSScriptAnalyzer |
              Where-Object { $_.Version -eq [version]$required }
          if (-not $have) {
              try {
                  Install-Module PSScriptAnalyzer -RequiredVersion $required -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
              } catch {
                  Install-PSResource PSScriptAnalyzer -Version $required -Scope CurrentUser -TrustRepository -Reinstall -ErrorAction Stop
              }
          }
          Import-Module PSScriptAnalyzer -RequiredVersion $required -ErrorAction Stop
          Write-Output "PSScriptAnalyzer $((Get-Module PSScriptAnalyzer).Version) on pwsh $($PSVersionTable.PSVersion)"
      - name: PowerShell module fixtures test
        run: bash harness/shell/run-tests.sh modules/powershell/pssa.test.sh

  ci-status:
    if: always()
    needs: [markdown, powershell, markdown-fixtures, powershell-fixtures]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: >-
            ${{ needs.markdown.result }}
            ${{ needs.powershell.result }}
            ${{ needs.markdown-fixtures.result }}
            ${{ needs.powershell-fixtures.result }}
        run: |
          for r in $RESULTS; do
            case "$r" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
