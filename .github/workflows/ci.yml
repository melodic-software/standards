name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Self-lint lanes run the ci-workflows composite actions (referenced by SHA,
# bumped via Dependabot). The fixture-assertion lanes stay local — they prove
# this repo's own configs flag the bad fixtures — and the ci-status gateway
# aggregates every lane into the single required check. link-check is the one
# deliberate exception: it is advisory/scheduled and lives in its own workflow.
jobs:
  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: melodic-software/ci-workflows/.github/actions/markdown@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          globs: '**/*.md !fixtures/*/bad/**'

  powershell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: melodic-software/ci-workflows/.github/actions/powershell@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          exclude: fixtures/powershell/bad

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint shell
        uses: melodic-software/ci-workflows/.github/actions/shellcheck@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          exclude: fixtures/shellcheck/bad

  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links (offline)
        uses: melodic-software/ci-workflows/.github/actions/lychee-offline@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          exclude: 'fixtures/[^/]+/bad'

  editorconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Self-lint repository (installs ec, excludes intentionally-bad fixtures)
        uses: melodic-software/ci-workflows/.github/actions/editorconfig@bd977e02f74001f9f672680dc8d37fc86dd0465f # bd977e0 2026-06-23
        with:
          exclude: 'fixtures/[^/]+/bad/'
      - name: editorconfig module fixtures test
        run: bash harness/shell/run-tests.sh modules/editorconfig/editorconfig.test.sh

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan repository for secrets (installs gitleaks)
        uses: melodic-software/ci-workflows/.github/actions/gitleaks@bd977e02f74001f9f672680dc8d37fc86dd0465f # bd977e0 2026-06-23
      - name: gitleaks module fixtures test
        run: bash harness/shell/run-tests.sh modules/gitleaks/gitleaks.test.sh

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spell-check repository (installs typos, excludes intentionally-bad fixtures)
        uses: melodic-software/ci-workflows/.github/actions/typos@bd977e02f74001f9f672680dc8d37fc86dd0465f # bd977e0 2026-06-23
        with:
          exclude: 'fixtures/*/bad/'
      - name: typos module fixtures test
        run: bash harness/shell/run-tests.sh modules/typos/typos.test.sh

  markdown-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Markdown module fixtures test
        run: bash harness/shell/run-tests.sh modules/markdown/markdown.test.sh

  powershell-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Ensure PSScriptAnalyzer 1.25.0
        shell: pwsh
        run: |
          $required = '1.25.0'
          $have = Get-Module -ListAvailable PSScriptAnalyzer |
              Where-Object { $_.Version -eq [version]$required }
          if (-not $have) {
              try {
                  Install-Module PSScriptAnalyzer -RequiredVersion $required -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
              } catch {
                  Install-PSResource PSScriptAnalyzer -Version $required -Scope CurrentUser -TrustRepository -Reinstall -ErrorAction Stop
              }
          }
          Import-Module PSScriptAnalyzer -RequiredVersion $required -ErrorAction Stop
          Write-Output "PSScriptAnalyzer $((Get-Module PSScriptAnalyzer).Version) on pwsh $($PSVersionTable.PSVersion)"
      - name: PowerShell module fixtures test
        run: bash harness/shell/run-tests.sh modules/powershell/powershell.test.sh

  shellcheck-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ShellCheck 0.11.0
        run: |
          set -euo pipefail
          ver=0.11.0
          sha=b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6
          url="https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.gz"
          curl -fsSL "$url" -o shellcheck.tar.gz
          echo "${sha}  shellcheck.tar.gz" | sha256sum -c -
          tar -xzf shellcheck.tar.gz "shellcheck-v${ver}/shellcheck"
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          rm -rf shellcheck.tar.gz "shellcheck-v${ver}"
          shellcheck --version
      - name: shellcheck module fixtures test
        run: bash harness/shell/run-tests.sh modules/shellcheck/shellcheck.test.sh

  lychee-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install lychee 0.24.2
        run: |
          set -euo pipefail
          ver=0.24.2
          sha=1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          asset=lychee-x86_64-unknown-linux-gnu
          url="https://github.com/lycheeverse/lychee/releases/download/lychee-v${ver}/${asset}.tar.gz"
          curl -fsSL "$url" -o lychee.tar.gz
          echo "${sha}  lychee.tar.gz" | sha256sum -c -
          tar -xzf lychee.tar.gz --strip-components=1 "${asset}/lychee"
          sudo install lychee /usr/local/bin/lychee
          rm -f lychee.tar.gz lychee
          lychee --version
      - name: lychee module fixtures test
        run: bash harness/shell/run-tests.sh modules/lychee/lychee.test.sh

  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check Python
        uses: melodic-software/ci-workflows/.github/actions/ruff@c1e0ebd047810122d3d619c02ab3b211f17f9c9a # c1e0ebd 2026-06-23
        with:
          exclude: fixtures/python/bad

  pyright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check Python
        # The shipped ruleset carries no project-scope `include`, so scope Pyright
        # at the conforming fixture explicitly (the bad fixture is non-conforming
        # by design).
        uses: melodic-software/ci-workflows/.github/actions/pyright@c1e0ebd047810122d3d619c02ab3b211f17f9c9a # c1e0ebd 2026-06-23
        with:
          paths: fixtures/python/good

  biome:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check JS/TS
        # Biome has no CLI exclude, so scope at the conforming fixture (the repo
        # carries no other JS/TS source; the bad fixture is non-conforming by
        # design).
        uses: melodic-software/ci-workflows/.github/actions/biome@01b34dc9c32a50b2e0314f74af958217107f3b27 # 01b34dc 2026-06-23
        with:
          paths: fixtures/typescript/good

  tsc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check TypeScript
        # The shipped ruleset carries no project-scope `include`, so point tsc at
        # the conforming fixture's project, which extends the base and supplies
        # `include` (the bad fixture is non-conforming by design).
        uses: melodic-software/ci-workflows/.github/actions/tsc@01b34dc9c32a50b2e0314f74af958217107f3b27 # 01b34dc 2026-06-23
        with:
          project: fixtures/typescript/good/tsconfig.json

  dotnet-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build .NET (analyzers + code-style as errors)
        # The shipped base carries no project scope, so scope the build at the
        # conforming fixture, which imports the base props (the bad fixture is
        # non-conforming by design).
        uses: melodic-software/ci-workflows/.github/actions/dotnet-build@0c00056055483581bd2ce7b64b607f1c1a564918 # 0c00056 2026-06-23
        with:
          project: fixtures/dotnet/good/good.csproj

  dotnet-format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify .NET whitespace
        uses: melodic-software/ci-workflows/.github/actions/dotnet-format@0c00056055483581bd2ce7b64b607f1c1a564918 # 0c00056 2026-06-23
        with:
          project: fixtures/dotnet/good/good.csproj

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: melodic-software/ci-workflows/.github/actions/actionlint@62235bb7b77b483459dbc4034982451accabaf92 # 62235bb 2026-06-23

  zizmor:
    permissions:
      contents: read
    # Advisory Actions security lint; findings annotate without blocking.
    uses: melodic-software/ci-workflows/.github/workflows/zizmor.yml@c59411f929120a00fee213797a9e8c9fc2a2031c # c59411f 2026-06-23
    with:
      paths: .

  osv-scanner:
    permissions:
      actions: read
      contents: read
      security-events: write
    # Advisory dependency vuln scan; reports against package-lock.json without
    # blocking (fail-on-vuln defaults false).
    uses: melodic-software/ci-workflows/.github/workflows/osv-scanner.yml@c59411f929120a00fee213797a9e8c9fc2a2031c # c59411f 2026-06-23

  python-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Inline install — the fixtures suite asserts specific rule codes fire on
      # the bad fixture, which needs the tools on PATH (the ruff/pyright actions
      # only pass/fail). Keep in lockstep with the action defaults in ci-workflows
      # and with medley.
      RUFF_VERSION: 0.15.14
      PYRIGHT_VERSION: 1.1.409
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
      - name: Install ruff and pyright
        run: |
          uv tool install "ruff==${RUFF_VERSION}"
          uv tool install "pyright==${PYRIGHT_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify toolchain
        # Also warms pyright's first-run Node download so the test step is fast.
        run: |
          ruff --version
          pyright --version
      - name: python module fixtures test
        run: bash harness/shell/run-tests.sh modules/python/python.test.sh

  typescript-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Inline install — the fixtures suite asserts specific rule/error codes on
      # the bad fixture, which needs the tools on PATH (the biome/tsc actions
      # only pass/fail). Keep in lockstep with the action defaults in ci-workflows
      # and with medley.
      BIOME_VERSION: 2.5.1
      TYPESCRIPT_VERSION: 6.0.3
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Install biome and tsc
        run: npm install -g "@biomejs/biome@${BIOME_VERSION}" "typescript@${TYPESCRIPT_VERSION}"
      - name: Verify toolchain
        run: |
          biome --version
          tsc --version
      - name: typescript module fixtures test
        run: bash harness/shell/run-tests.sh modules/typescript/typescript.test.sh

  dotnet-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Inline install — the fixtures suite asserts specific rule codes fire on
      # the bad fixture, which needs the SDK on PATH (the dotnet-build/dotnet-format
      # actions only pass/fail). Keep in lockstep with the action defaults in
      # ci-workflows and with medley.
      DOTNET_VERSION: 10.0.301
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Verify toolchain
        run: dotnet --version
      - name: dotnet module fixtures test
        run: bash harness/shell/run-tests.sh modules/dotnet/dotnet.test.sh

  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Harness self-test
        run: bash harness/shell/run-tests.sh harness/shell/lib.test.sh

  ci-status:
    if: always()
    needs:
      - markdown
      - powershell
      - shellcheck
      - lychee
      - editorconfig
      - gitleaks
      - typos
      - markdown-fixtures
      - powershell-fixtures
      - shellcheck-fixtures
      - lychee-fixtures
      - ruff
      - pyright
      - python-fixtures
      - biome
      - tsc
      - typescript-fixtures
      - dotnet-build
      - dotnet-format
      - dotnet-fixtures
      - harness
      - actionlint
      - zizmor
      - osv-scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: >-
            ${{ needs.markdown.result }}
            ${{ needs.powershell.result }}
            ${{ needs.shellcheck.result }}
            ${{ needs.lychee.result }}
            ${{ needs.editorconfig.result }}
            ${{ needs.gitleaks.result }}
            ${{ needs.typos.result }}
            ${{ needs.markdown-fixtures.result }}
            ${{ needs.powershell-fixtures.result }}
            ${{ needs.shellcheck-fixtures.result }}
            ${{ needs.lychee-fixtures.result }}
            ${{ needs.ruff.result }}
            ${{ needs.pyright.result }}
            ${{ needs.python-fixtures.result }}
            ${{ needs.biome.result }}
            ${{ needs.tsc.result }}
            ${{ needs.typescript-fixtures.result }}
            ${{ needs.dotnet-build.result }}
            ${{ needs.dotnet-format.result }}
            ${{ needs.dotnet-fixtures.result }}
            ${{ needs.harness.result }}
            ${{ needs.actionlint.result }}
            ${{ needs.zizmor.result }}
            ${{ needs.osv-scanner.result }}
        run: |
          for r in $RESULTS; do
            case "$r" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
