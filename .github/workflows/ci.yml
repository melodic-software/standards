name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# The PR number keys pull_request runs, so a new push supersedes that PR's
# in-flight run without colliding with same-named branches from other head
# repos; main pushes fall back to the unique run_id and are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Every eligible lane shares one same-contract central selector decision. A
# selector failure cannot skip required work: every workload directly uses a
# cancellation-safe condition and an explicit ubuntu-24.04 fallback. The
# ci-status gateway stays hosted and aggregates only the original lane IDs, so
# required check names do not change. Workload steps are route-independent:
# pinned setup/composite actions install every tool, and existing setup-action
# caches remain GitHub-managed rather than host-mounted.
jobs:
  select-runner:
    permissions: {}
    uses: melodic-software/ci-workflows/.github/workflows/select-runner.yml@c2654182bc2d78f7909795df78304d482aa69226 # 3415de3 2026-07-13
    secrets:
      observer-private-key: ${{ secrets.CI_RUNNER_OBSERVER_PRIVATE_KEY }}
    with:
      policy: ${{ vars.CI_RUNNER_POLICY }}
      self-hosted-label: ${{ vars.CI_SELF_HOSTED_LABEL }}
      hosted-runner: ${{ vars.CI_HOSTED_RUNNER }}
      scope: ${{ vars.CI_RUNNER_SCOPE }}
      managed-runner-prefix: ${{ vars.CI_MANAGED_RUNNER_PREFIX }}
      observer-client-id: ${{ vars.CI_RUNNER_OBSERVER_CLIENT_ID }}

  markdown:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: melodic-software/ci-workflows/.github/actions/markdown@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: .markdownlint-cli2.jsonc
          globs: '**/*.md !components/**/fixtures/bad/**'

  powershell:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: melodic-software/ci-workflows/.github/actions/powershell@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          settings: PSScriptAnalyzerSettings.psd1
          exclude: components/psscriptanalyzer/fixtures/bad

  shellcheck:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint shell
        uses: melodic-software/ci-workflows/.github/actions/shellcheck@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          rcfile: .shellcheckrc
          exclude: components/shellcheck/fixtures/bad

  lychee:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links (offline)
        uses: melodic-software/ci-workflows/.github/actions/lychee-offline@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: lychee.toml
          exclude: 'components/[^/]+/fixtures/bad'

  editorconfig:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Self-lint repository (installs ec, excludes intentionally-bad fixtures)
        uses: melodic-software/ci-workflows/.github/actions/editorconfig@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: .editorconfig-checker.json
          exclude: 'components/[^/]+/fixtures/bad/'
      - name: EditorConfig checker contract test
        run: bash harness/shell/run-tests.sh components/editorconfig-checker/editorconfig-checker.test.sh

  gitleaks:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan repository for secrets (installs gitleaks)
        uses: melodic-software/ci-workflows/.github/actions/gitleaks@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: .gitleaks.toml
      - name: Gitleaks contract test
        run: bash harness/shell/run-tests.sh components/gitleaks/gitleaks.test.sh

  typos:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spell-check repository (installs typos, excludes intentionally-bad fixtures)
        uses: melodic-software/ci-workflows/.github/actions/typos@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: _typos.toml
          exclude: 'components/*/fixtures/bad/'
      - name: Typos contract test
        run: bash harness/shell/run-tests.sh components/typos/typos.test.sh

  markdown-fixtures:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Markdownlint contract test
        run: bash harness/shell/run-tests.sh components/markdownlint/markdownlint.test.sh

  runner-policy:
    name: Runner policy
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Test runner policy
        run: npm run test:runner-policy
      - name: Test .NET staged adapter
        run: npm run test:lefthook-dotnet
      - name: Enforce runner policy on standards
        run: npm run lint:runner-policy
        env:
          CI_REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}

  powershell-fixtures:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Ensure PSScriptAnalyzer 1.25.0
        shell: pwsh
        run: |
          $required = '1.25.0'
          $have = Get-Module -ListAvailable PSScriptAnalyzer |
              Where-Object { $_.Version -eq [version]$required }
          if (-not $have) {
              try {
                  Install-Module PSScriptAnalyzer -RequiredVersion $required -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
              } catch {
                  Install-PSResource PSScriptAnalyzer -Version $required -Scope CurrentUser -TrustRepository -Reinstall -ErrorAction Stop
              }
          }
          Import-Module PSScriptAnalyzer -RequiredVersion $required -ErrorAction Stop
          Write-Output "PSScriptAnalyzer $((Get-Module PSScriptAnalyzer).Version) on pwsh $($PSVersionTable.PSVersion)"
      - name: PSScriptAnalyzer contract test
        run: bash harness/shell/run-tests.sh components/psscriptanalyzer/psscriptanalyzer.test.sh
      - name: PSScriptAnalyzer staged-adapter regression
        shell: pwsh
        run: ./components/lefthook-powershell/psscriptanalyzer-staged.test.ps1

  shellcheck-fixtures:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ShellCheck 0.11.0
        run: |
          set -euo pipefail
          ver=0.11.0
          sha=b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6
          url="https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.gz"
          curl -fsSL "$url" -o shellcheck.tar.gz
          echo "${sha}  shellcheck.tar.gz" | sha256sum -c -
          tar -xzf shellcheck.tar.gz "shellcheck-v${ver}/shellcheck"
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          rm -rf shellcheck.tar.gz "shellcheck-v${ver}"
          shellcheck --version
      - name: ShellCheck contract test
        run: bash harness/shell/run-tests.sh components/shellcheck/shellcheck.test.sh

  lychee-fixtures:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install lychee 0.24.2
        run: |
          set -euo pipefail
          ver=0.24.2
          sha=1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          asset=lychee-x86_64-unknown-linux-gnu
          url="https://github.com/lycheeverse/lychee/releases/download/lychee-v${ver}/${asset}.tar.gz"
          curl -fsSL "$url" -o lychee.tar.gz
          echo "${sha}  lychee.tar.gz" | sha256sum -c -
          tar -xzf lychee.tar.gz --strip-components=1 "${asset}/lychee"
          sudo install lychee /usr/local/bin/lychee
          rm -f lychee.tar.gz lychee
          lychee --version
      - name: Lychee contract test
        run: bash harness/shell/run-tests.sh components/lychee/lychee.test.sh

  ruff:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check Python
        uses: melodic-software/ci-workflows/.github/actions/ruff@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: ruff.toml
          exclude: components/ruff/fixtures/bad

  pyright:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check Python
        # The shipped ruleset carries no project-scope `include`, so scope Pyright
        # at the conforming fixture explicitly (the bad fixture is non-conforming
        # by design).
        uses: melodic-software/ci-workflows/.github/actions/pyright@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: components/pyright/pyrightconfig.json
          paths: components/pyright/fixtures/good

  biome:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check JS/TS
        # Biome has no CLI exclude, so scope at the conforming fixture and the
        # runner-policy implementation. The bad fixture is non-conforming by
        # design.
        uses: melodic-software/ci-workflows/.github/actions/biome@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          config: components/biome/biome.json
          paths: components/biome/fixtures/good components/runner-policy

  tsc:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check TypeScript
        # The shipped ruleset carries no project-scope `include`, so point tsc at
        # the conforming fixture's project, which extends the base and supplies
        # `include` (the bad fixture is non-conforming by design).
        uses: melodic-software/ci-workflows/.github/actions/tsc@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          project: components/tsconfig/fixtures/good/tsconfig.json

  dotnet-build:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    env:
      # The rootless fleet has no write access to setup-dotnet's Linux default.
      # Keep hosted/local parity by selecting a per-job ephemeral directory.
      DOTNET_INSTALL_DIR: ~/.dotnet
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build .NET (analyzers + code-style as errors)
        # The shipped base carries no project scope, so scope the build at the
        # conforming fixture, which imports the base props (the bad fixture is
        # non-conforming by design).
        uses: melodic-software/ci-workflows/.github/actions/dotnet-build@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          project: components/dotnet-analysis/fixtures/good/good.csproj

  dotnet-format:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    env:
      DOTNET_INSTALL_DIR: ~/.dotnet
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify .NET whitespace
        uses: melodic-software/ci-workflows/.github/actions/dotnet-format@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          project: components/dotnet-analysis/fixtures/good/good.csproj

  actionlint:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: melodic-software/ci-workflows/.github/actions/actionlint@c2654182bc2d78f7909795df78304d482aa69226 # 99ac2f8 2026-07-11

  zizmor:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    # Advisory Actions security lint; findings annotate without blocking.
    uses: melodic-software/ci-workflows/.github/workflows/zizmor.yml@c2654182bc2d78f7909795df78304d482aa69226 # de50a08 2026-07-12
    with:
      runner: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
      paths: .

  osv-scanner:
    permissions:
      contents: read
    # Advisory dependency vuln scan; reports against package-lock.json without
    # blocking (fail-on-vuln defaults false). Annotation mode needs no
    # security-events write grant.
    uses: melodic-software/ci-workflows/.github/workflows/osv-scanner.yml@c2654182bc2d78f7909795df78304d482aa69226 # 99ac2f8 2026-07-11

  python-fixtures:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    env:
      # Inline install — component contract tests assert specific rule codes on
      # bad fixtures, which needs the tools on PATH (the Ruff/Pyright actions
      # only pass/fail). Keep in lockstep with the action defaults in ci-workflows
      # and with medley.
      RUFF_VERSION: 0.15.14
      PYRIGHT_VERSION: 1.1.409
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: "3.14"
      - name: Install ruff and pyright
        run: |
          uv tool install "ruff==${RUFF_VERSION}"
          uv tool install "pyright==${PYRIGHT_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify toolchain
        # Also warms pyright's first-run Node download so the test step is fast.
        run: |
          ruff --version
          pyright --version
      - name: Ruff contract test
        run: bash harness/shell/run-tests.sh components/ruff/ruff.test.sh
      - name: Pyright contract test
        run: bash harness/shell/run-tests.sh components/pyright/pyright.test.sh

  typescript-fixtures:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    env:
      # Inline install — component tests assert specific rule/error codes on
      # the bad fixture, which needs the tools on PATH (the biome/tsc actions
      # only pass/fail). Keep in lockstep with the action defaults in ci-workflows
      # and with medley.
      BIOME_VERSION: 2.5.1
      TYPESCRIPT_VERSION: 6.0.3
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Install biome and tsc
        run: npm install -g "@biomejs/biome@${BIOME_VERSION}" "typescript@${TYPESCRIPT_VERSION}"
      - name: Verify toolchain
        run: |
          biome --version
          tsc --version
      - name: Biome contract test
        run: bash harness/shell/run-tests.sh components/biome/biome.test.sh
      - name: TypeScript config contract test
        run: bash harness/shell/run-tests.sh components/tsconfig/tsconfig.test.sh

  dotnet-fixtures:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    env:
      # Inline install — the fixtures suite asserts specific rule codes fire on
      # the bad fixture, which needs the SDK on PATH (the dotnet-build/dotnet-format
      # actions only pass/fail). Keep in lockstep with the action defaults in
      # ci-workflows and with medley.
      DOTNET_INSTALL_DIR: ~/.dotnet
      DOTNET_VERSION: 10.0.301
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Verify toolchain
        run: |
          dotnet --version
          node --version
      - name: .NET analysis contract test
        run: bash harness/shell/run-tests.sh components/dotnet-analysis/dotnet-analysis.test.sh
      - name: .NET staged-adapter integration
        run: >-
          node components/lefthook-dotnet/dotnet-format-staged.mjs
          components/dotnet-analysis/fixtures/good/Calculator.cs
        env:
          DOTNET_FORMAT_WORKSPACE: components/dotnet-analysis/fixtures/good/good.csproj

  harness:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Harness self-test
        run: bash harness/shell/run-tests.sh harness/shell/lib.test.sh

  distribution:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install yq 4.53.3
        run: |
          set -euo pipefail
          version=4.53.3
          sha=fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4
          url="https://github.com/mikefarah/yq/releases/download/v${version}/yq_linux_amd64"
          curl -fsSL "$url" -o yq
          echo "${sha}  yq" | sha256sum -c -
          sudo install yq /usr/local/bin/yq
          rm yq
          yq --version
      - name: Test distribution engine
        run: bash distribution/sync-manifest.test.sh
      - name: Validate production manifest
        run: bash distribution/sync-manifest.sh validate

  exec-bit:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify shebang files are executable
        uses: melodic-software/ci-workflows/.github/actions/exec-bit@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10

  machine-specific-paths:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for machine-specific paths
        uses: melodic-software/ci-workflows/.github/actions/machine-specific-paths@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10

  eol-renormalize:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check index-level EOL drift
        uses: melodic-software/ci-workflows/.github/actions/eol-renormalize@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10

  comment-hygiene:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan comment hygiene (excludes contract fixtures and policy source)
        uses: melodic-software/ci-workflows/.github/actions/comment-hygiene@c2654182bc2d78f7909795df78304d482aa69226 # 1d3762c 2026-07-10
        with:
          exclude: ':(exclude)components/*/fixtures/bad/** :(exclude)components/comment-hygiene/**'
      - name: Comment-hygiene contract test
        run: bash harness/shell/run-tests.sh components/comment-hygiene/comment-hygiene.test.sh

  lefthook:
    needs: select-runner
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    runs-on: ${{ needs.select-runner.outputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Put npm bin on PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Install ShellCheck 0.11.0
        # The component test drives the ShellCheck lane as its representative tool,
        # so the engine must be on PATH (kept in lockstep with shellcheck-fixtures).
        run: |
          set -euo pipefail
          ver=0.11.0
          sha=b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6
          url="https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.gz"
          curl -fsSL "$url" -o shellcheck.tar.gz
          echo "${sha}  shellcheck.tar.gz" | sha256sum -c -
          tar -xzf shellcheck.tar.gz "shellcheck-v${ver}/shellcheck"
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          rm -rf shellcheck.tar.gz "shellcheck-v${ver}"
          shellcheck --version
      - name: Validate the merged hook config (root + all fragments)
        run: lefthook validate
      - name: Lefthook ShellCheck contract test
        run: bash harness/shell/run-tests.sh components/lefthook-shellcheck/lefthook-shellcheck.test.sh

  ci-status:
    if: always()
    permissions: {}
    needs:
      - markdown
      - powershell
      - shellcheck
      - lychee
      - editorconfig
      - gitleaks
      - typos
      - markdown-fixtures
      - runner-policy
      - powershell-fixtures
      - shellcheck-fixtures
      - lychee-fixtures
      - ruff
      - pyright
      - python-fixtures
      - biome
      - tsc
      - typescript-fixtures
      - dotnet-build
      - dotnet-format
      - dotnet-fixtures
      - harness
      - distribution
      - lefthook
      - exec-bit
      - machine-specific-paths
      - eol-renormalize
      - comment-hygiene
      - actionlint
      - zizmor
      - osv-scanner
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: >-
            ${{ needs.markdown.result }}
            ${{ needs.powershell.result }}
            ${{ needs.shellcheck.result }}
            ${{ needs.lychee.result }}
            ${{ needs.editorconfig.result }}
            ${{ needs.gitleaks.result }}
            ${{ needs.typos.result }}
            ${{ needs.markdown-fixtures.result }}
            ${{ needs.runner-policy.result }}
            ${{ needs.powershell-fixtures.result }}
            ${{ needs.shellcheck-fixtures.result }}
            ${{ needs.lychee-fixtures.result }}
            ${{ needs.ruff.result }}
            ${{ needs.pyright.result }}
            ${{ needs.python-fixtures.result }}
            ${{ needs.biome.result }}
            ${{ needs.tsc.result }}
            ${{ needs.typescript-fixtures.result }}
            ${{ needs.dotnet-build.result }}
            ${{ needs.dotnet-format.result }}
            ${{ needs.dotnet-fixtures.result }}
            ${{ needs.harness.result }}
            ${{ needs.distribution.result }}
            ${{ needs.lefthook.result }}
            ${{ needs.exec-bit.result }}
            ${{ needs.machine-specific-paths.result }}
            ${{ needs.eol-renormalize.result }}
            ${{ needs.comment-hygiene.result }}
            ${{ needs.actionlint.result }}
            ${{ needs.zizmor.result }}
            ${{ needs.osv-scanner.result }}
        run: |
          for r in $RESULTS; do
            case "$r" in
              success) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed."
