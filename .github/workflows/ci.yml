name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Self-lint lanes run the ci-workflows composite actions (referenced by SHA,
# bumped via Dependabot). The fixture-assertion lanes stay local — they prove
# this repo's own configs flag the bad fixtures — and the ci-status gateway
# aggregates every lane into the single required check. link-check is the one
# deliberate exception: it is advisory/scheduled and lives in its own workflow.
jobs:
  markdown:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint markdown
        uses: melodic-software/ci-workflows/.github/actions/markdown@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          globs: '**/*.md !fixtures/*/bad/**'

  powershell:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Analyze PowerShell
        uses: melodic-software/ci-workflows/.github/actions/powershell@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          exclude: fixtures/powershell/bad

  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint shell
        uses: melodic-software/ci-workflows/.github/actions/shellcheck@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          exclude: fixtures/shellcheck/bad

  lychee:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check links (offline)
        uses: melodic-software/ci-workflows/.github/actions/lychee-offline@9780be3d05b30e06dd6e5b038ff3c7135c530b36 # 9780be3 2026-06-22
        with:
          exclude: 'fixtures/[^/]+/bad'

  editorconfig:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up editorconfig-checker
        uses: editorconfig-checker/action-editorconfig-checker@840e866d93b8e032123c23bac69dece044d4d84c # v2.2.0
        with:
          version: v3.6.1
      - name: Self-lint repository (excludes intentionally-bad fixtures)
        run: editorconfig-checker -config modules/editorconfig/.editorconfig-checker.json -exclude 'fixtures/[^/]+/bad/' .
      - name: editorconfig module fixtures test
        run: bash harness/shell/run-tests.sh modules/editorconfig/editorconfig.test.sh

  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # gitleaks-action requires an org license; install-action has no gitleaks
      # manifest. Pin the release tarball by version + SHA256 instead.
      - name: Install gitleaks
        run: |
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "$url" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          rm -f gitleaks gitleaks.tar.gz
          gitleaks version
      - name: Scan repository for secrets
        run: gitleaks dir . --config modules/gitleaks/.gitleaks.toml --no-banner
      - name: gitleaks module fixtures test
        run: bash harness/shell/run-tests.sh modules/gitleaks/gitleaks.test.sh

  typos:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Install the binary only (the crate-ci/typos action runs against the full
      # tree and cannot pass --exclude, so the bad fixtures would fail it). We
      # run typos ourselves so the published config stays adopter-clean.
      - name: Set up typos
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: typos@1.47.2
      - name: Spell-check repository (excludes intentionally-bad fixtures)
        run: typos --config modules/typos/_typos.toml --exclude 'fixtures/*/bad/' .
      - name: typos module fixtures test
        run: bash harness/shell/run-tests.sh modules/typos/typos.test.sh

  markdown-fixtures:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Markdown module fixtures test
        run: bash harness/shell/run-tests.sh modules/markdown/markdown.test.sh

  powershell-fixtures:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Ensure PSScriptAnalyzer 1.25.0
        shell: pwsh
        run: |
          $required = '1.25.0'
          $have = Get-Module -ListAvailable PSScriptAnalyzer |
              Where-Object { $_.Version -eq [version]$required }
          if (-not $have) {
              try {
                  Install-Module PSScriptAnalyzer -RequiredVersion $required -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
              } catch {
                  Install-PSResource PSScriptAnalyzer -Version $required -Scope CurrentUser -TrustRepository -Reinstall -ErrorAction Stop
              }
          }
          Import-Module PSScriptAnalyzer -RequiredVersion $required -ErrorAction Stop
          Write-Output "PSScriptAnalyzer $((Get-Module PSScriptAnalyzer).Version) on pwsh $($PSVersionTable.PSVersion)"
      - name: PowerShell module fixtures test
        run: bash harness/shell/run-tests.sh modules/powershell/powershell.test.sh

  shellcheck-fixtures:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install ShellCheck 0.11.0
        run: |
          set -euo pipefail
          ver=0.11.0
          sha=b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6
          url="https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.gz"
          curl -fsSL "$url" -o shellcheck.tar.gz
          echo "${sha}  shellcheck.tar.gz" | sha256sum -c -
          tar -xzf shellcheck.tar.gz "shellcheck-v${ver}/shellcheck"
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          rm -rf shellcheck.tar.gz "shellcheck-v${ver}"
          shellcheck --version
      - name: shellcheck module fixtures test
        run: bash harness/shell/run-tests.sh modules/shellcheck/shellcheck.test.sh

  lychee-fixtures:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install lychee 0.24.2
        run: |
          set -euo pipefail
          ver=0.24.2
          sha=1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          asset=lychee-x86_64-unknown-linux-gnu
          url="https://github.com/lycheeverse/lychee/releases/download/lychee-v${ver}/${asset}.tar.gz"
          curl -fsSL "$url" -o lychee.tar.gz
          echo "${sha}  lychee.tar.gz" | sha256sum -c -
          tar -xzf lychee.tar.gz --strip-components=1 "${asset}/lychee"
          sudo install lychee /usr/local/bin/lychee
          rm -f lychee.tar.gz lychee
          lychee --version
      - name: lychee module fixtures test
        run: bash harness/shell/run-tests.sh modules/lychee/lychee.test.sh

  harness:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Harness self-test
        run: bash harness/shell/run-tests.sh harness/shell/lib.test.sh

  ci-status:
    if: always()
    needs:
      - markdown
      - powershell
      - shellcheck
      - lychee
      - editorconfig
      - gitleaks
      - typos
      - markdown-fixtures
      - powershell-fixtures
      - shellcheck-fixtures
      - lychee-fixtures
      - harness
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: >-
            ${{ needs.markdown.result }}
            ${{ needs.powershell.result }}
            ${{ needs.shellcheck.result }}
            ${{ needs.lychee.result }}
            ${{ needs.editorconfig.result }}
            ${{ needs.gitleaks.result }}
            ${{ needs.typos.result }}
            ${{ needs.markdown-fixtures.result }}
            ${{ needs.powershell-fixtures.result }}
            ${{ needs.shellcheck-fixtures.result }}
            ${{ needs.lychee-fixtures.result }}
            ${{ needs.harness.result }}
        run: |
          for r in $RESULTS; do
            case "$r" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
