name: claude-review

# Automated PR code review via the ci-workflows reusable workflow. The caller
# owns the triggers + GITHUB_TOKEN permission grant (a called workflow can only
# downgrade them, never elevate); the reusable workflow owns the action pin and
# the secret-handling safety model.
#
# Fork PRs receive no secrets and a read-only token, so they are simply not
# reviewed by design (no token-exfiltration surface). Requires `standards` to be
# in the CLAUDE_CODE_OAUTH_TOKEN org secret's selected-repositories scope.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read

# No caller-level concurrency: the reusable workflow already supersedes
# in-flight reviews per PR via job-level concurrency (`claude-review-<pr>`),
# and a caller group with the same name would deadlock the called job.

jobs:
  # Resolves the capped review tier's label (not the default fleet label) so
  # reviews queue on the dedicated review scale set instead of competing with
  # build capacity.
  select-review:
    name: Select runner
    permissions: {}
    uses: melodic-software/ci-workflows/.github/workflows/select-runner.yml@90f1c54cf871a3aed4f1eb14a279a1651975a794 # 90f1c54 2026-07-18
    secrets:
      observer-private-key: ${{ secrets.CI_RUNNER_OBSERVER_PRIVATE_KEY }}
    with:
      policy: ${{ vars.CI_RUNNER_POLICY }}
      self-hosted-label: ${{ vars.CI_REVIEW_SELF_HOSTED_LABEL }}
      hosted-runner: ${{ vars.CI_HOSTED_RUNNER }}
      scope: ${{ vars.CI_RUNNER_SCOPE }}
      managed-runner-prefix: ${{ vars.CI_MANAGED_RUNNER_PREFIX }}
      observer-client-id: ${{ vars.CI_RUNNER_OBSERVER_CLIENT_ID }}

  review:
    needs: select-review
    # !cancelled() overrides GitHub's skip propagation, so selector success must
    # be required explicitly: a hard-failed selector emits no runner output and
    # the hosted fallback below would otherwise run this privileged job.
    if: ${{ !cancelled() && needs.select-review.result == 'success' }}
    permissions:
      contents: read         # checkout + read the diff
      pull-requests: write   # post review + track_progress tracking comment
      id-token: write        # OIDC — mints the Claude GitHub App token
    uses: melodic-software/ci-workflows/.github/workflows/claude-review.yml@90f1c54cf871a3aed4f1eb14a279a1651975a794 # 90f1c54 2026-07-18
    with:
      runner: ${{ needs.select-review.outputs.runner || 'ubuntu-24.04' }}
    # Pass only the one named secret (least privilege) rather than `secrets:
    # inherit`, which would forward every parent secret to the called workflow.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
