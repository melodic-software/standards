name: do-not-merge

# Standalone required check that blocks merge while the PR carries the
# `do-not-merge` label (the reusable's default). It runs on pull_request_target
# so the base-branch definition gates and a head-branch edit cannot neuter it; it
# reads PR label metadata only and checks out no head code. The emitted
# required-check context is `do-not-merge / do-not-merge`. Public repo: runs on
# the reusable's hosted default runner.
on:
  # zizmor: ignore[dangerous-triggers] metadata-only gate; rationale in the header comment
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  merge_group:

permissions:
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  do-not-merge:
    permissions:
      pull-requests: read
    uses: melodic-software/ci-workflows/.github/workflows/do-not-merge-gate.yml@90f1c54935203fa31b5b3d1f41531228be2c2b7f # 90f1c54 2026-07-18
    with:
      runner: ubuntu-24.04
