name: do-not-merge

# Standalone required check that blocks merge while the PR carries the
# `do-not-merge` label (the reusable's default). It runs on pull_request_target
# so the base-branch definition gates and a head-branch edit cannot neuter it; it
# reads PR label metadata only and checks out no head code. The emitted
# required-check context is `do-not-merge / do-not-merge`.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  merge_group:

permissions:
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  do-not-merge:
    permissions:
      pull-requests: read
    uses: melodic-software/ci-workflows/.github/workflows/do-not-merge-gate.yml@ec91c3433a8c3c0a7ebbdd239286e5a6a25eeec5 # ec91c34 2026-07-17
    with:
      runner: ubuntu-24.04
