name: editorconfig

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up editorconfig-checker
        uses: editorconfig-checker/action-editorconfig-checker@840e866d93b8e032123c23bac69dece044d4d84c # v2.2.0
        with:
          version: v3.6.1

      - name: Self-lint repository (excludes intentionally-bad fixtures)
        run: editorconfig-checker -config modules/editorconfig/.editorconfig-checker.json -exclude 'fixtures/[^/]+/bad/' .

      - name: editorconfig module fixtures test
        run: bash harness/shell/run-tests.sh modules/editorconfig/editorconfig.test.sh
