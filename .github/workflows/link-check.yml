name: link-check

# Advisory online external-link check (not part of ci-status). Runs weekly and
# on demand; files a rolling tracking issue on failure rather than gating merges.
# Deterministic on-disk link integrity is the lychee lane in ci.yml.
on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    # issues: write is scoped to this job (least privilege) — only the called
    # workflow files the rolling tracking issue.
    permissions:
      contents: read
      issues: write
    uses: melodic-software/ci-workflows/.github/workflows/link-check.yml@ec91c3433a8c3c0a7ebbdd239286e5a6a25eeec5 # ec91c34 2026-07-17
    with:
      runner: ubuntu-24.04
      # The called workflow's defaults plus one repo-specific addition: the
      # online lane also verifies local file links, so the intentionally-broken
      # lychee fixture must be excluded here (the offline lane in ci.yml already
      # excludes it). `args` is a single input, so overriding it restates the
      # defaults.
      args: >-
        --cache
        --max-cache-age 7d
        --no-progress
        --accept-timeouts
        --exclude-path 'components/[^/]+/fixtures/bad'
        --config lychee.toml
        './**/*.md'
