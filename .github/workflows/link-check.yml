name: link-check

# Advisory online external-link check (not part of ci-status). Runs weekly and
# on demand; files a rolling tracking issue on failure rather than gating merges.
# Deterministic on-disk link integrity is the lychee lane in ci.yml. Public
# repo: runs on the reusable's hosted default runner.
on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    # issues: write is scoped to this job (least privilege) — only the called
    # workflow files the rolling tracking issue.
    permissions:
      contents: read
      issues: write
    uses: melodic-software/ci-workflows/.github/workflows/link-check.yml@90f1c54935203fa31b5b3d1f41531228be2c2b7f # 90f1c54 2026-07-18
    with:
      runner: ubuntu-24.04
      # The called workflow's defaults plus one repo-specific addition: the
      # online lane also verifies local file links, so component fixtures stay
      # in their dedicated offline contract lane rather than becoming external
      # link-check inputs. `args` is a single input, so overriding it restates
      # the defaults.
      args: >-
        --cache
        --max-cache-age 7d
        --no-progress
        --accept-timeouts
        --exclude-path 'components/[^/]+/fixtures'
        --config lychee.toml
        './**/*.md'
