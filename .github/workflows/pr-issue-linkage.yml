name: pr-issue-linkage

# Standalone required check that validates the PR body carries a native closing
# keyword and a non-empty Related section. It runs on pull_request_target so the
# base-branch definition gates and a head-branch edit cannot bypass it; it reads
# body metadata from the event payload only and checks out no head code. The
# emitted required-check context is `pr-issue-linkage / pr-issue-linkage`.
# Public repo: runs on the reusable's hosted default runner.
on:
  # zizmor: ignore[dangerous-triggers] metadata-only gate; rationale in the header comment
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-issue-linkage:
    permissions: {}
    uses: melodic-software/ci-workflows/.github/workflows/pr-issue-linkage.yml@90f1c54935203fa31b5b3d1f41531228be2c2b7f # 90f1c54 2026-07-18
    with:
      runner: ubuntu-24.04
