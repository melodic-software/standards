name: publish-packages

# Package components are published directly from their cohesive source slices.
# There is no staging copy: the authored, tested, packed, and published config
# is the same file. If an already-published version's complete packed payload
# differs from a fresh local pack, the workflow fails and requires a version bump.
on:
  push:
    branches: [main]
    paths:
      - components/biome/**
      - components/tsconfig/**
      - .github/workflows/publish-packages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [biome, tsconfig]
    defaults:
      run:
        working-directory: components/${{ matrix.component }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node with the GitHub Packages registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: https://npm.pkg.github.com
          scope: '@melodic-software'

      - name: Pack the complete component payload
        id: pack
        run: |
          set -euo pipefail
          destination="$RUNNER_TEMP/local-package"
          mkdir -p "$destination"
          npm pack --json --pack-destination "$destination" > "$RUNNER_TEMP/pack.json"
          filename="$(node -e 'const p=require(process.argv[1]); process.stdout.write(p[0].filename)' "$RUNNER_TEMP/pack.json")"
          echo "tarball=$destination/$filename" >> "$GITHUB_OUTPUT"

      - name: Publish a new version or reject unbumped payload drift
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCAL_TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          # Only E404 means the version is absent. Authentication or registry
          # failures must abort rather than fall through to a publish attempt.
          view_err="$(mktemp)"
          set +e
          view_out="$(npm view "$name@$version" dist.tarball 2>"$view_err")"
          view_rc=$?
          set -e
          if [ "$view_rc" -ne 0 ] && ! grep -q "E404" "$view_err"; then
            echo "::error::npm view failed for $name@$version (not a 404): $(cat "$view_err")"
            exit 1
          fi
          cat "$view_err" >&2 || true

          if [ "$view_rc" -ne 0 ]; then
            npm publish "$LOCAL_TARBALL"
            echo "published $name@$version"
            exit 0
          fi

          compare="$RUNNER_TEMP/compare"
          mkdir -p "$compare/local" "$compare/published"
          curl -fsSL -H "Authorization: Bearer $NODE_AUTH_TOKEN" "$view_out" \
            -o "$compare/published.tgz"
          tar -xzf "$LOCAL_TARBALL" -C "$compare/local"
          tar -xzf "$compare/published.tgz" -C "$compare/published"
          if ! diff -ru --no-dereference "$compare/published/package" "$compare/local/package"; then
            echo "::error::$name@$version is published but its complete payload changed; bump components/${{ matrix.component }}/package.json"
            exit 1
          fi
          echo "$name@$version already published and matches the complete local payload"
