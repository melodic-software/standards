name: standards-sync-stuck-automerge-alert

# Watchdog for sync.yml's auto-merge arming: scans standards-sync target repos
# (read from the manifest, never hardcoded) for App-authored sync PRs armed
# for auto-merge but BLOCKED past a threshold, and files/refreshes a rolling
# tracking issue in this repo — the calling repo, not any scanned target.
#
# BLOCKED ON melodic-software/ci-workflows#<PR1>: the pinned SHA below
# predates that PR, which moves the reusable's issue writes onto a
# self-minted App token instead of this caller's ambient GITHUB_TOKEN. Flip
# the pin to PR1's merge SHA once it lands (this workflow needs no other
# change — no allowedCallerPermissions waiver, no caller-side issues:write).
on:
  workflow_dispatch:
  schedule:
    # Off-minute hourly poll: catches an armed PR stuck behind an unrelated
    # gate failure well within a single working day.
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  alert:
    uses: melodic-software/ci-workflows/.github/workflows/standards-sync-stuck-automerge-alert.yml@dd45dacd7b74dd05f3334b78769e57225f7356d8 # dd45dac 2026-07-22 — pre-PR1, see BLOCKED ON note above
    with:
      runner: ubuntu-24.04
    secrets:
      app-client-id: ${{ secrets.STANDARDS_SYNC_APP_CLIENT_ID }}
      app-private-key: ${{ secrets.STANDARDS_SYNC_APP_PRIVATE_KEY }}
