name: standards-sync

# Track B config distribution — calls the reusable sync engine in ci-workflows,
# which reads distribution/sync-manifest.yml and opens a PR per target repo.
# See docs/dedup-program/config-distribution-plan.md.
#
# Staged activation: dispatch-only (dry-run by default) until the single-target
# pilot passes. A follow-up adds the push (paths: distributed files) and weekly
# schedule triggers with `dry-run: ${{ inputs.dry-run || false }}` — the `||
# false` makes schedule/push runs real while manual dispatch keeps its preview
# default. Landing those triggers now would let a modules-touching merge or the
# Monday cron fire a full-fleet real sync before the pilot is confirmed.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Plan only — log the per-target file set; no PRs opened.
        type: boolean
        default: true
      targets:
        description: >-
          Comma-separated allowlist of manifest targets (owner/name) to sync;
          empty means all. Pilot / staged-rollout control.
        type: string
        default: ''

permissions:
  contents: read

jobs:
  sync:
    uses: melodic-software/ci-workflows/.github/workflows/standards-sync.yml@9cf6d135c3786595fd8081098d9fee3559341a74 # 9cf6d13 2026-07-06
    with:
      dry-run: ${{ inputs.dry-run }}
      targets: ${{ inputs.targets }}
    secrets:
      app-id: ${{ secrets.STANDARDS_SYNC_APP_ID }}
      app-private-key: ${{ secrets.STANDARDS_SYNC_APP_PRIVATE_KEY }}
