name: standards-sync

# Exact-file distribution: standards owns desired bytes and ci-workflows owns
# GitHub orchestration. Every real run opens or refreshes one reviewed PR per
# target; it never writes directly to a target's default branch.
on:
  push:
    branches: [main]
    paths:
      - .editorconfig
      - .editorconfig-checker.json
      - .gitattributes
      - .gitleaks.toml
      - .markdownlint-cli2.jsonc
      - .node-version
      - .shellcheckrc
      - _typos.toml
      - PSScriptAnalyzerSettings.psd1
      - lychee.toml
      - components/**
      - docs/adr/README.md
      - docs/adr/adr-template.md
      - distribution/sync-manifest.sh
      - distribution/sync-manifest.yml
  workflow_dispatch:
    inputs:
      dry-run:
        description: Plan only — log the per-target file set; no PRs opened.
        type: boolean
        default: true
      targets:
        description: >-
          Comma-separated allowlist of manifest targets (owner/name) to sync;
          empty means all. Pilot / staged-rollout control.
        type: string
        default: ''
  schedule:
    # Off-minute weekly reconciliation catches interrupted or missed cascades.
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  sync:
    uses: melodic-software/ci-workflows/.github/workflows/standards-sync.yml@e103a330577206213a4ebc0919029d2533c39cdb # e103a33 2026-07-10
    with:
      # Schedule and push run for real (inputs is empty on those events, so
      # `|| false` makes them real runs); manual dispatch keeps its dry-run
      # preview default. Do NOT flip to `== 'schedule'` — that inverts it and
      # the weekly cascade would silently never fire.
      dry-run: ${{ inputs.dry-run || false }}
      targets: ${{ inputs.targets || '' }}
    secrets:
      app-client-id: ${{ secrets.STANDARDS_SYNC_APP_CLIENT_ID }}
      app-private-key: ${{ secrets.STANDARDS_SYNC_APP_PRIVATE_KEY }}
