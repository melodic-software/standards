# gitleaks — https://github.com/gitleaks/gitleaks
# Config reference: https://github.com/gitleaks/gitleaks#configuration
#
# Root-canonical policy: inherit the upstream default ruleset and add nothing
# repo-specific. Managed consumers do not edit this file. Intentional findings
# use a repository-owned .gitleaksignore or inline `gitleaks:allow` comment.

# Floor the engine version: silences the "no minVersion specified" debug
# warning (v8.29.0+) and pins the feature baseline this config relies on
# (`[extend].useDefault`, `[[allowlists]]`).
minVersion = "v8.25.0"

[extend]
useDefault = true
