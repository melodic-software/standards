# .NET adapter — opt-in. Extend it alongside the base from a consumer root that
# has C# sources, Node, and the .NET SDK installed. The consumer must merge an
# exact repository-relative project or solution into this command's environment:
#
# pre-commit:
#   commands:
#     dotnet-format:
#       env:
#         DOTNET_FORMAT_WORKSPACE: Repository.sln
#
# The wrapper fails closed when that value is absent or unsafe. It passes each
# existing staged path as its own argument and never asks dotnet format to infer
# a workspace from repository contents.
#
# This lane runs whitespace verification only — the one thing `dotnet format`
# owns in the .NET analysis component's split. The build-enforced analyzers and code-style
# (CAxxxx / IDExxxx) are deliberately left to CI: a full analyzer build is too
# slow for pre-commit, and running it here would double-report against the CI
# build lane. This is the heaviest opt-in lane (it loads MSBuild); skip it via a
# gitignored lefthook-local.yml if local commit latency matters more than parity.

pre-commit:
  commands:
    dotnet-format:
      glob: "**/*.cs"
      run: node .lefthook/dotnet-format-staged.mjs {staged_files}
      fail_text: >-
        Whitespace/layout drift or invalid DOTNET_FORMAT_WORKSPACE. Run: dotnet
        format whitespace <workspace> --include <files>
