# Python adapter — opt-in. Extend it alongside the base from a consumer root
# that has Python sources and the ruff binary installed. Ruff auto-discovers
# ruff.toml / pyproject.toml from the repo root.
#
# Lint and format are split (matching the Ruff component): `ruff check` owns lint,
# `ruff format --check` owns formatting. Type-checking (Pyright) is deliberately
# left to CI — it needs whole-project context, not a per-file staged check, and
# pairing it here would double-report against the CI type-check lane.

pre-commit:
  commands:
    ruff-lint:
      glob: "**/*.{py,pyi}"
      run: ruff check {staged_files}
      fail_text: "Ruff lint failures. Run: ruff check --fix <files>"
    ruff-format:
      glob: "**/*.{py,pyi}"
      run: ruff format --check {staged_files}
      fail_text: "Ruff format drift. Run: ruff format <files>"
