# Exact materializations owned by melodic-software/standards.
# Native package, GitHub Actions, and IaC adoption remain authoritative in
# their respective consumer manifests and are intentionally absent here.
version: 2

components:
  agent-orientation:
    files:
      AGENTS.md: AGENTS.md
  architecture-decisions:
    files:
      docs/adr/README.md: docs/adr/README.md
      docs/adr/adr-template.md: docs/adr/adr-template.md
  comment-hygiene-action:
    files:
      components/comment-hygiene/comment-hygiene-patterns.sh: .github/actions/comment-hygiene/comment-hygiene-patterns.sh
  dotnet-analysis:
    files:
      components/dotnet-analysis/Directory.Build.props: eng/dotnet-analysis/Directory.Build.props
      components/dotnet-analysis/dotnet.globalconfig: eng/dotnet-analysis/dotnet.globalconfig
  editorconfig-checker:
    requires:
      - repository-text
    files:
      .editorconfig-checker.json: .editorconfig-checker.json
  gitleaks:
    files:
      .gitleaks.toml: .gitleaks.toml
  go-analysis:
    files:
      .golangci.yml: .golangci.yml
  lefthook-base:
    requires:
      - editorconfig-checker
      - gitleaks
      - markdownlint
      - node-runtime
      - repository-text
      - typos
    files:
      components/lefthook-base/lefthook.yml: .lefthook/base.yml
  lefthook-dotnet:
    requires:
      - dotnet-analysis
      - lefthook-base
      - node-runtime
    files:
      components/lefthook-dotnet/dotnet-format-staged.mjs: .lefthook/dotnet-format-staged.mjs
      components/lefthook-dotnet/lefthook.yml: .lefthook/dotnet.yml
  lefthook-powershell:
    requires:
      - lefthook-base
      - psscriptanalyzer
    files:
      components/lefthook-powershell/lefthook.yml: .lefthook/powershell.yml
      components/lefthook-powershell/psscriptanalyzer-staged.ps1: .lefthook/psscriptanalyzer-staged.ps1
      components/lefthook-powershell/psscriptanalyzer-target.ps1: .lefthook/psscriptanalyzer-target.ps1
  lefthook-python:
    requires:
      - lefthook-base
      - ruff
    files:
      components/lefthook-python/lefthook.yml: .lefthook/python.yml
  lefthook-shellcheck:
    requires:
      - lefthook-base
      - shellcheck
    files:
      components/lefthook-shellcheck/lefthook.yml: .lefthook/shellcheck.yml
  lychee:
    files:
      lychee.toml: lychee.toml
  markdownlint:
    files:
      .markdownlint-cli2.jsonc: .markdownlint-cli2.jsonc
  node-runtime:
    files:
      .node-version: .node-version
  psscriptanalyzer:
    files:
      PSScriptAnalyzerSettings.psd1: PSScriptAnalyzerSettings.psd1
  pyright:
    files:
      components/pyright/pyrightconfig.json: .github/standards/pyright/pyrightconfig.json
  repository-text:
    files:
      .editorconfig: .editorconfig
      .gitattributes: .gitattributes
  review-instructions:
    files:
      REVIEW.md: REVIEW.md
  ruff:
    files:
      ruff.toml: ruff.toml
  runner-policy:
    requires:
      - node-runtime
    files:
      components/runner-policy/package-lock.json: .github/standards/runner-policy/package-lock.json
      components/runner-policy/package.json: .github/standards/runner-policy/package.json
      components/runner-policy/policy.json: .github/standards/runner-policy/policy.json
      components/runner-policy/policy.schema.json: .github/standards/runner-policy/policy.schema.json
      components/runner-policy/repository-policy.schema.json: .github/standards/runner-policy/repository-policy.schema.json
      components/runner-policy/runner-policy.mjs: .github/standards/runner-policy/runner-policy.mjs
  shellcheck:
    files:
      .shellcheckrc: .shellcheckrc
  typos:
    files:
      _typos.toml: _typos.toml

targets:
  melodic-software/.github:
    managed:
      - editorconfig-checker
      - gitleaks
      - lychee
      - markdownlint
      - repository-text
      - typos
  melodic-software/ci-runner:
    managed:
      - editorconfig-checker
      - gitleaks
      - go-analysis
      - lychee
      - markdownlint
      - repository-text
      - shellcheck
      - typos
  melodic-software/ci-workflows:
    managed:
      - comment-hygiene-action
      - editorconfig-checker
      - gitleaks
      - lychee
      - markdownlint
      - psscriptanalyzer
      - repository-text
      - review-instructions
      - shellcheck
      - typos
  melodic-software/claude-code-plugins:
    managed:
      - agent-orientation
      - editorconfig-checker
      - gitleaks
      - lychee
      - markdownlint
      - node-runtime
      - repository-text
      - review-instructions
      - runner-policy
      - shellcheck
      - typos
  melodic-software/dotfiles:
    managed:
      - agent-orientation
      - editorconfig-checker
      - gitleaks
      - lefthook-base
      - lefthook-powershell
      - lefthook-python
      - lefthook-shellcheck
      - lychee
      - markdownlint
      - node-runtime
      - psscriptanalyzer
      - pyright
      - repository-text
      - review-instructions
      - ruff
      - runner-policy
      - typos
    locally-owned:
      - shellcheck
  melodic-software/github-iac:
    managed:
      - agent-orientation
      - dotnet-analysis
      - editorconfig-checker
      - gitleaks
      - lefthook-base
      - lefthook-dotnet
      - lychee
      - markdownlint
      - node-runtime
      - repository-text
      - review-instructions
      - runner-policy
      - typos
  melodic-software/medley:
    managed:
      - architecture-decisions
      - node-runtime
      - runner-policy
    locally-owned:
      - agent-orientation
      - gitleaks
      - review-instructions
  melodic-software/provisioning:
    managed:
      - agent-orientation
      - editorconfig-checker
      - gitleaks
      - lefthook-base
      - lefthook-powershell
      - lefthook-shellcheck
      - lychee
      - markdownlint
      - node-runtime
      - psscriptanalyzer
      - repository-text
      - review-instructions
      - runner-policy
      - shellcheck
      - typos
