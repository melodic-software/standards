# Dogfood: standards runs the hooks it ships. This root config composes the base
# fragment plus every overlay exactly as a consumer would — the open/closed
# extensibility point is this file; the fragments under modules/lefthook/ are
# never edited. CI validates the merged config (`lefthook validate`) and a unit
# test (modules/lefthook/lefthook.test.sh) exercises a representative lane
# end-to-end. The strict top-level posture (min_version, assert_lefthook_installed,
# glob_matcher) is inherited from base.yml.
#
# A real consumer's root config is also where project scope and any opt-outs live
# — add a `pre-commit.commands.<lane>` entry to set `exclude:`/`skip:` for one
# lane (a new key merges onto the inherited lane), or override anything for one
# machine via a gitignored lefthook-local.yml. This repo keeps the root config to
# pure composition: its own sources are covered by the base lanes, and its
# language samples under fixtures/ are owned by the per-module fixtures lanes.
extends:
  - modules/lefthook/base.yml
  - modules/lefthook/lefthook-powershell.yml
  - modules/lefthook/lefthook-python.yml
  - modules/lefthook/lefthook-typescript.yml
  - modules/lefthook/lefthook-dotnet.yml
