# Base local git-hook lanes — fast, staged-only mirrors of the cross-cutting
# hygiene tools this platform standardizes. Extend it from a consumer's own root
# lefthook.yml (see modules/lefthook/README.md); never edit it in place.
#
# Decoupled by construction: every lane invokes a tool and lets that tool
# discover its own standards config from the repo root (no --config paths here),
# so this file carries no repo-specific or layout-specific knowledge and never
# re-configures a tool. The module owns each tool's config; the per-module
# fixtures lanes own proving it; these lanes only invoke.
#
# Strict posture: check-only (no stage_fixed — a hook never silently rewrites and
# re-stages your work), and assert_lefthook_installed so a missing binary fails
# loudly instead of skipping a check. Settings live here because base is the
# mandatory foundation every consumer extends; an extended file's settings win
# over the consumer's root file, so the strict posture cannot be loosened by
# accident (only deliberately, via a gitignored lefthook-local.yml).

min_version: "2.0.0"
assert_lefthook_installed: true
# doublestar so a `**/*.ext` glob matches files at the repo root and at any depth
# alike (the default matcher requires `**` to consume at least one directory).
glob_matcher: doublestar

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    typos:
      # Spell-check staged files; auto-discovers _typos.toml from the repo root.
      glob: "**/*"
      run: typos {staged_files}
      fail_text: "Spelling issues. Fix them, or record a false positive per the typos module's escape hatches."
    gitleaks:
      # Secret-scan the staged diff. gitleaks reads `git diff --cached` itself, so
      # it takes no file list, and auto-discovers .gitleaks.toml from the root.
      run: gitleaks git --pre-commit --staged --no-banner
      fail_text: "Potential secret in staged changes. Remove it, or allowlist a verified false positive in .gitleaks.toml."
    editorconfig:
      # Enforce .editorconfig on staged files; editorconfig-checker discovers both
      # .editorconfig and its own .editorconfig-checker.json from the root. Some
      # installs expose the binary as `ec` (or `ec-windows-amd64` via winget) —
      # alias it to `editorconfig-checker`, or override this lane's run accordingly.
      glob: "**/*"
      run: editorconfig-checker {staged_files}
      fail_text: "EditorConfig violation. Align with .editorconfig (most editors auto-fix on save)."
    shellcheck:
      # Auto-discovers .shellcheckrc from the root for any options (e.g.
      # external-sources); kept flag-free here so that config is the single owner.
      glob: "**/*.{sh,bash}"
      run: shellcheck {staged_files}
      fail_text: "ShellCheck findings. Fix them, or annotate a justified exception with a shellcheck directive."
    markdownlint:
      # npx resolves the consumer's pinned markdownlint-cli2 from node_modules
      # (node_modules/.bin is not on a hook's PATH); auto-discovers the config.
      glob: "**/*.{md,markdown}"
      run: npx markdownlint-cli2 {staged_files}
      fail_text: "Markdown lint failures. Run: npx markdownlint-cli2 --fix <file>"
