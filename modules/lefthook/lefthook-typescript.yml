# TypeScript overlay — opt-in. Extend it alongside base.yml from a consumer root
# that has JS/TS sources. Biome auto-discovers biome.json from the repo root (the
# shipped ruleset is `root: false`, so a consumer's root biome.json `extends` it).
#
# Biome owns lint + format + import sorting in one pass. Type-checking (tsc) is
# deliberately left to CI — it needs the project's tsconfig graph, not a per-file
# staged check, and pairing it here would double-report against the CI tsc lane.

pre-commit:
  commands:
    biome:
      # npx resolves the consumer's pinned Biome from node_modules (node_modules/.bin
      # is not on a hook's PATH). `check` runs lint + format + import-sort.
      glob: "**/*.{ts,tsx,cts,mts,js,jsx,cjs,mjs,json,jsonc}"
      run: npx @biomejs/biome check {staged_files}
      fail_text: "Biome findings. Run: npx @biomejs/biome check --write <files>"
